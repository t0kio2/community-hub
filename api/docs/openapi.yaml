openapi: 3.0.3
info:
  title: Community Hub API
  version: 0.1.0
  description: |
    本APIの暫定OpenAPI定義です。認証（Devise + JWT）、Hello、Usersの主要エンドポイントを定義しています。
servers:
  - url: http://localhost:3000
    description: 開発環境
tags:
  - name: Auth
    description: ログイン・ログアウト・サインアップ
  - name: Hello
    description: 簡易動作確認用エンドポイント
  - name: Users
    description: ユーザ管理（JWT必須）
paths:
  /api/hello:
    get:
      tags: [Hello]
      summary: Hello（GET）
      parameters:
        - in: query
          name: name
          schema:
            type: string
          required: false
          description: 挨拶対象の名前
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  method:
                    type: string
                required: [message, method]
    post:
      tags: [Hello]
      summary: Hello（POST）
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  method:
                    type: string
                required: [message, method]

  /api/signup:
    post:
      tags: [Auth]
      summary: サインアップ
      description: Devise RegistrationsController#create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                    password_confirmation:
                      type: string
                  required: [email, password, password_confirmation]
              required: [user]
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/login:
    post:
      tags: [Auth]
      summary: ログイン
      description: |
        Devise SessionsController#create。
        成功時はレスポンスヘッダ `Authorization: Bearer <JWT>` が付与されます。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                  required: [email, password]
              required: [user]
      responses:
        '200':
          description: ログイン成功
          headers:
            Authorization:
              description: JWTベアラートークン（Bearer <token>）
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: 認証失敗
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/logout:
    delete:
      tags: [Auth]
      summary: ログアウト
      description: Devise SessionsController#destroy（JWT無効化）
      security:
        - bearerAuth: []
      responses:
        '204':
          description: ログアウト成功（No Content）
        '401':
          description: 未認証

  /api/users:
    get:
      tags: [Users]
      summary: ユーザ一覧取得
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: 未認証
    post:
      tags: [Users]
      summary: ユーザ作成
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  $ref: '#/components/schemas/UserWrite'
              required: [user]
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未認証

  /api/users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    get:
      tags: [Users]
      summary: ユーザ取得
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: 見つからない
        '401':
          description: 未認証
    patch:
      tags: [Users]
      summary: ユーザ更新
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  $ref: '#/components/schemas/UserWrite'
              required: [user]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未認証
    delete:
      tags: [Users]
      summary: ユーザ削除
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 削除成功（No Content）
        '401':
          description: 未認証

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, provider, admin]
        status:
          type: string
          enum: [active, suspended]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, email]
    UserWrite:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, provider, admin]
        status:
          type: string
          enum: [active, suspended]
      required: [email]
    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: string
      required: [errors]

